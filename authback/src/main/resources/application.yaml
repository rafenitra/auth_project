spring:
  application:
    name: authback

  datasource: 
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  security:
    jwt-secret: ${JWT_SECRET}

server: 
    port : ${SERVER_PORT}

