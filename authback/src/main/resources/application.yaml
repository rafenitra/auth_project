spring:

  profiles:
    active: dev

  application:
    name: authback

  datasource: 
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  security:
    jwt-secret: ${JWT_SECRET:default-insecure-test-key-32-chars-min}

server: 
    port : ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    org.springframework.web: INFO   # Détails sur les requêtes HTTP

