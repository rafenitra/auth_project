version: '3.9'

services:
  postgres_db:
    image: postgres:16
    container_name: auth-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  spring_app:
    build:
      context: ./authback
      dockerfile: Dockerfile
    image: rafenitra/auth-back
    container_name: authapp-back
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres_db:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      CORS_ORIGIN: ${CORS_URL}
    depends_on:
      - postgres_db

  angular_app:
    build:
      context: ./authfront
      dockerfile: Dockerfile
    image: rafenitra/auth-front
    container_name: authapp-front
    ports:
      - "80:80"
    depends_on:
      - spring_app

volumes:
  postgres_data:
