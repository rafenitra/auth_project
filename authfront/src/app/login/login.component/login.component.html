<div class="login-container">

  <h2>Connexion</h2>

  <form [formGroup]="form" (ngSubmit)="login()">

    <!-- Email -->
    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="ex: test@gmail.com">
      @if (form.get('email')?.invalid && form.get('email')?.touched) {
        <small>
        Email invalide.
        </small>
      }
      
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" formControlName="password" placeholder="Votre mot de passe">
      @if (form.get('password')?.invalid && form.get('password')?.touched) {
        <small>
        Mot de passe requis.
        </small>
      }
      
    </div>

    <!-- Error -->
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <!-- Success -->
    <p class="success" *ngIf="successMessage">{{ successMessage }}</p>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Connexion...' : 'Se connecter' }}
    </button>

  </form>

  <p class="register-link">
    Pas encore de compte ? <a routerLink="/register">Créer un compte</a>
  </p>

</div>
